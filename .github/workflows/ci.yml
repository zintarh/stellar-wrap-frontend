name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - "**"

jobs:
  check-lock-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for wrong lock files
        run: |
          if [ -f "package-lock.json" ]; then
            echo "❌ package-lock.json found! This project uses pnpm exclusively."
            exit 1
          fi
          if [ -f "yarn.lock" ]; then
            echo "❌ yarn.lock found! This project uses pnpm exclusively."
            exit 1
          fi
          if [ ! -f "pnpm-lock.yaml" ]; then
            echo "❌ pnpm-lock.yaml not found! Lock file is required."
            exit 1
          fi
          echo "✅ Lock file validation passed"

  build-and-lint:
    runs-on: ubuntu-latest
    needs: check-lock-files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

